<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンライン大富豪 (簡易版)</title>
    <!-- PeerJSのライブラリを読み込み -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1b5e20;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 10px; }
        .setup-box {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        input { padding: 5px; font-size: 16px; width: 200px; }
        button { padding: 6px 12px; font-size: 16px; cursor: pointer; background: #ff9800; border: none; color: white; border-radius: 4px; }
        button:hover { background: #e65100; }
        
        #game-room { width: 100%; max-width: 800px; display: none; }
        .table-area {
            background: #2e7d32;
            border: 4px solid #81c784;
            border-radius: 10px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        .card {
            width: 60px;
            height: 90px;
            background: white;
            color: black;
            border-radius: 5px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            margin: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            user-select: none;
            cursor: pointer;
        }
        .card.selected {
            transform: translateY(-15px);
            background: #fff9c4;
            border: 2px solid #ffb300;
        }
        .red { color: red; }
        
        .my-hand {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .controls { margin-top: 15px; }
        .status-bar { font-size: 18px; font-weight: bold; color: #ffeb3b; margin-bottom: 10px; text-align: center;}
    </style>
</head>
<body>

    <h1>🃏 オンライン大富豪 (2人プレイ専用)</h1>
    
    <!-- 接続設定エリア -->
    <div class="setup-box" id="setup">
        <p>あなたのID: <span id="my-id" style="color:#ffeb3b; font-weight:bold;">接続中...</span></p>
        <input type="text" id="peer-id-input" placeholder="友達のIDを入力">
        <button onclick="connectToFriend()">友達と接続してゲーム開始</button>
        <p style="font-size: 12px; color: #ccc;">※お互いにページを開き、片方がもう片方のIDを入力して接続してください。</p>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-room">
        <div class="status-bar" id="status">相手の接続を待っています...</div>
        
        <h3>場に出ているカード</h3>
        <div class="table-area" id="table">
            <!-- ここに場のカードが出ます -->
            <p id="table-empty">場は空です</p>
        </div>

        <div class="my-hand">
            <h3>あなたの手札</h3>
            <div id="hand-container"></div>
            <div class="controls">
                <button onclick="playSelectedCards()">カードを出す</button>
                <button onclick="passTurn()" style="background:#555;">パス</button>
                <button onclick="resetGame()" id="start-btn" style="background:#4caf50; display:none;">ゲームを配る/リセット</button>
            </div>
        </div>
    </div>

<script>
    // 簡易的なカードデータ (数字の強さは大富豪ルール: 3が最弱、2が最強)
    // わかりやすさのため、今回は1づつ強くなる数値で管理 (3=1, 4=2 ... K=11, A=12, 2=13)
    const cardMap = {
        1: {n:'3', v:1}, 2: {n:'4', v:2}, 3: {n:'5', v:3}, 4: {n:'6', v:4},
        5: {n:'7', v:5}, 6: {n:'8', v:6}, 7: {n:'9', v:7}, 8: {n:'10', v:8},
        9: {n:'J', v:9}, 10: {n:'Q', v:10}, 11: {n:'K', v:11}, 12: {n:'A', v:12}, 13: {n:'2', v:13}
    };
    const suits = ['♠', '♥', '♦', '♣'];

    let peer = new Peer(); // PeerJSの初期化
    let conn = null;
    let myHand = [];
    let selectedCards = [];
    let tableCard = null; // 現在場にあるカードの強さ数値
    let tableCount = 0;   // 場に出ている枚数
    let isMyTurn = false;
    let amIHost = false;

    // PeerJS IDの取得
    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
    });

    // 相手からの接続を待機 (ホスト側になる)
    peer.on('connection', (connection) => {
        conn = connection;
        amIHost = true;
        setupConnection();
    });

    // 自分から接続を仕掛ける (ゲスト側になる)
    function connectToFriend() {
        const friendId = document.getElementById('peer-id-input').value;
        if(!friendId) return alert("友達のIDを入力してください");
        conn = peer.connect(friendId);
        amIHost = false;
        setupConnection();
    }

    // 通信のセットアップ
    function setupConnection() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-room').style.display = 'block';
        
        conn.on('open', () => {
            document.getElementById('status').innerText = amIHost ? "接続完了！あなたが親です。ゲームを開始してください。" : "接続完了！親がカードを配るのを待っています...";
            if(amIHost) {
                document.getElementById('start-btn').style.display = 'inline-block';
            }
        });

        // 相手からデータを受信したときの処理
        conn.on('data', (data) => {
            if (data.type === 'START') {
                myHand = data.hand;
                tableCard = null;
                tableCount = 0;
                isMyTurn = data.yourTurn;
                updateUI();
            } else if (data.type === 'PLAY') {
                tableCard = data.cardValue;
                tableCount = data.count;
                isMyTurn = true;
                updateUI();
                checkWinCondition();
            } else if (data.type === 'PASS') {
                isMyTurn = true;
                updateUI();
            }
        });
    }

    // ゲームの初期化と配札 (ホストのみ実行可能)
    function resetGame() {
        // 全カード生成 (簡単のためジョーカーなしの52枚からランダムに20枚づつ配る簡易版)
        let deck = [];
        for(let suit of suits) {
            for(let key in cardMap) {
                deck.push({ suit: suit, name: cardMap[key].n, value: cardMap[key].v });
            }
        }
        // シャッフル
        deck.sort(() => Math.random() - 0.5);

        // 2人に10枚ずつ配る（サクッと遊べる枚数）
        const hand1 = deck.slice(0, 10).sort((a,b) => a.value - b.value);
        const hand2 = deck.slice(10, 20).sort((a,b) => a.value - b.value);

        myHand = hand1;
        isMyTurn = true; // ホストが先攻
        tableCard = null;
        tableCount = 0;

        // ゲストに手札を送信
        conn.send({ type: 'START', hand: hand2, yourTurn: false });
        updateUI();
    }

    // UIの更新
    function updateUI() {
        // ステータス表示
        const statusEl = document.getElementById('status');
        if (isMyTurn) {
            statusEl.innerText = "🌟 あなたの番です！";
            statusEl.style.color = "#ffeb3b";
        } else {
            statusEl.innerText = "相手のターンを待っています...";
            statusEl.style.color = "#ffffff";
        }

        // 場の表示
        const tableEl = document.getElementById('table');
        if (tableCard === null) {
            tableEl.innerHTML = '<p id="table-empty">場は空です (何でも出せます)</p>';
        } else {
            // 表示用に簡易再現
            let cardName = Object.keys(cardMap).find(k => cardMap[k].v === tableCard);
            let displayNum = cardMap[cardName].n;
            let cardsHtml = '';
            for(let i=0; i<tableCount; i++) {
                cardsHtml += `<div class="card">♣ ${displayNum}</div>`;
            }
            tableEl.innerHTML = cardsHtml;
        }

        // 手札の表示
        const handContainer = document.getElementById('hand-container');
        handContainer.innerHTML = '';
        selectedCards = [];

        myHand.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = `card ${card.suit === '♥' || card.suit === '♦' ? 'red' : ''}`;
            cardEl.innerText = `${card.suit}\n${card.name}`;
            cardEl.onclick = () => toggleSelectCard(index, cardEl);
            handContainer.appendChild(cardEl);
        });
    }

    // カードの選択・解除
    function toggleSelectCard(index, element) {
        const pos = selectedCards.indexOf(index);
        if (pos > -1) {
            selectedCards.splice(pos, 1);
            element.classList.remove('selected');
        } else {
            selectedCards.push(index);
            element.classList.add('selected');
        }
    }

    // カードを出す
    function playSelectedCards() {
        if (!isMyTurn) return alert("あなたのターンではありません！");
        if (selectedCards.length === 0) return alert("出すカードを選んでください");

        // 選択されたカードの実体を取得
        let cardsToPlay = selectedCards.map(idx => myHand[idx]);
        
        // すべて同じ数字かチェック
        let firstVal = cardsToPlay[0].value;
        let allSame = cardsToPlay.every(c => c.value === firstVal);
        if (!allSame) return alert("同じ数字のカードしか同時に出せません！");

        // 場のルール判定 (枚数縛り & 強さ縛り)
        if (tableCard !== null) {
            if (cardsToPlay.length !== tableCount) {
                return alert(`場に出ている枚数（${tableCount}枚）と同じ枚数出してください！`);
            }
            if (firstVal <= tableCard) {
                return alert("場に出ているカードより強いカード（3が最弱、2が最強）を出してください！");
            }
        }

        // 判定クリア：場を更新
        tableCard = firstVal;
        tableCount = cardsToPlay.length;

        // 手札から削除 (インデックスの後ろから消す)
        selectedCards.sort((a, b) => b - a).forEach(idx => {
            myHand.splice(idx, 1);
        });

        isMyTurn = false;
        updateUI();

        // 相手に送信
        conn.send({ type: 'PLAY', cardValue: tableCard, count: tableCount });

        // 勝利判定
        setTimeout(checkWinCondition, 100);
    }

    // パス
    function passTurn() {
        if (!isMyTurn) return alert("あなたのターンではありません！");
        isMyTurn = false;
        updateUI();
        conn.send({ type: 'PASS' });
    }

    // 勝敗チェック
    function checkWinCondition() {
        if (myHand.length === 0) {
            alert("🎉 おめでとうございます！あなたの大勝ち（大富豪）です！");
            document.getElementById('status').innerText = "あなたの勝利！";
        }
    }
</script>
</body>
</html>
