<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>オンライン大富豪 | 完全版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1b5e20;
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { font-size: 1.5rem; margin: 5px 0 15px 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        
        .setup-box {
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
        .id-display {
            background: #222;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #ffeb3b;
            word-break: break-all;
            margin: 10px 0;
            user-select: all;
            border: 1px solid #444;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #ff9800;
            border: none;
            color: white;
            border-radius: 6px;
            transition: background 0.2s;
            box-shadow: 0 4px 0 #e65100;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #e65100; }
        
        #game-room { width: 100%; max-width: 500px; display: none; }
        .status-bar {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffeb3b;
            margin-bottom: 15px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 20px;
        }
        
        .table-title { font-size: 0.9rem; margin: 5px 0; opacity: 0.9; text-align: center;}
        .table-area {
            background: #2e7d32;
            border: 3px solid #81c784;
            border-radius: 12px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        #table-empty { color: rgba(255,255,255,0.6); font-size: 0.9rem; }

        .hand-title { font-size: 0.9rem; margin: 5px 0; opacity: 0.9; }
        .my-hand {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
        }
        .hand-scroll {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
            min-height: 90px;
        }
        
        .card {
            width: 55px;
            height: 80px;
            background: white;
            color: black;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px 4px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            transition: transform 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        .card .suit-top { align-self: flex-start; font-size: 11px; }
        .card .number { align-self: center; font-size: 20px; margin-top: -5px; }
        .card .suit-bottom { align-self: flex-end; font-size: 11px; transform: rotate(180deg); }
        .card.red { color: #d32f2f; }
        
        .card.selected {
            transform: translateY(-15px);
            background: #fff9c4;
            box-shadow: 0 5px 15px rgba(255,235,59,0.5);
            border: 2px solid #ffb300;
        }
        
        .controls { display: flex; gap: 10px; width: 100%; }
        .controls button { flex: 2; }
        .controls button.pass-btn { background: #555; box-shadow: 0 4px 0 #333; flex: 1; }
        .controls button.host-btn { background: #4caf50; box-shadow: 0 4px 0 #2e7d32; display: none; margin-bottom: 10px; }
        
        .error-log { color: #ff5252; font-size: 0.85rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🃏 オンライン大富豪</h1>
    
    <div class="setup-box" id="setup">
        <p style="margin:0 0 5px 0; font-size:0.9rem;">あなたの対戦URL:</p>
        <div class="id-display" id="my-url">サーバー通信中...</div>
        <p style="font-size: 0.8rem; color: #ccc; margin-bottom: 20px;">上のURLをコピーしてLINE等で友達に送ってください</p>
        
        <div id="guest-input-area" style="display:none;">
            <p style="margin:0 0 10px 0; font-size:0.95rem; color:#ff9800; font-weight:bold;">友達の部屋のURLからアクセス中</p>
            <button onclick="connectToHostFromUrl()">友達の部屋に入る</button>
        </div>
        <div class="error-log" id="error-msg"></div>
    </div>

    <div id="game-room">
        <div class="status-bar" id="status">接続を確立しています...</div>
        
        <div class="table-title">場に出ているカード</div>
        <div class="table-area" id="table">
            <p id="table-empty">場は空です</p>
        </div>

        <button onclick="resetGame()" id="start-btn" class="host-btn">カードを配る (新ゲーム開始)</button>

        <div class="my-hand">
            <div class="hand-title">あなたの手札 (タップして選択)</div>
            <div class="hand-scroll" id="hand-container"></div>
            
            <div class="controls">
                <button onclick="passTurn()" class="pass-btn">パス</button>
                <button onclick="playSelectedCards()">カードを出す</button>
            </div>
        </div>
    </div>

<script>
    // 強さ定義: 3=1, 4=2 ... K=11, A=12, 2=13
    const cardMap = {
        1: {n:'3', v:1}, 2: {n:'4', v:2}, 3: {n:'5', v:3}, 4: {n:'6', v:4},
        5: {n:'7', v:5}, 6: {n:'8', v:6}, 7: {n:'9', v:7}, 8: {n:'10', v:8},
        9: {n:'J', v:9}, 10: {n:'Q', v:10}, 11: {n:'K', v:11}, 12: {n:'A', v:12}, 13: {n:'2', v:13}
    };

    // PeerJSの接続オプション（SSL/HTTPS必須環境に対応）
    let peer = new Peer({
        config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]},
        debug: 1
    });
    
    let conn = null;
    let myHand = [];
    let selectedCards = [];
    let tableCard = null;
    let tableCount = 0;
    let isMyTurn = false;
    let amIHost = false;
    let targetHostId = null;
    let consecutivePasses = 0; // 連続パス回数の記録

    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');

    // サーバー接続成功時
    peer.on('open', (id) => {
        const currentUrl = window.location.href.split('?')[0];
        const inviteUrl = `${currentUrl}?room=${id}`;
        document.getElementById('my-url').innerText = inviteUrl;

        if (roomParam) {
            targetHostId = roomParam;
            document.getElementById('guest-input-area').style.display = 'block';
        }
    });

    // エラーハンドリング
    peer.on('error', (err) => {
        console.error(err);
        document.getElementById('error-msg').innerText = "接続エラーが発生しました。ページを再読み込みしてください。";
    });

    // 相手からの接続をキャッチ (ホスト)
    peer.on('connection', (connection) => {
        conn = connection;
        amIHost = true;
        setupConnection();
    });

    // 自分から接続 (ゲスト)
    function connectToFriend(friendId) {
        conn = peer.connect(friendId);
        amIHost = false;
        setupConnection();
    }

    function connectToHostFromUrl() {
        if(targetHostId) connectToFriend(targetHostId);
    }

    // データ通信の受信ロジック
    function setupConnection() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-room').style.display = 'block';
        
        conn.on('open', () => {
            document.getElementById('status').innerText = amIHost ? "接続完了！カードを配ってください" : "接続完了！親が配るのを待っています...";
            if(amIHost) {
                document.getElementById('start-btn').style.display = 'block';
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'START') {
                myHand = data.hand;
                tableCard = null;
                tableCount = 0;
                consecutivePasses = 0;
                isMyTurn = data.yourTurn;
                updateUI();
            } else if (data.type === 'PLAY') {
                tableCard = data.cardValue;
                tableCount = data.count;
                consecutivePasses = 0; // カードが出たのでリセット
                isMyTurn = true;
                updateUI();
                checkWinCondition();
            } else if (data.type === 'PASS') {
                consecutivePasses++;
                // 2人プレイで相手がパス＝場が流れる
                if (consecutivePasses >= 1) {
                    tableCard = null;
                    tableCount = 0;
                    consecutivePasses = 0;
                }
                isMyTurn = true;
                updateUI();
            }
        });
        
        conn.on('close', () => {
            alert("対戦相手との接続が切れました。");
            location.reload();
        });
    }

    // ゲーム開始・リセット
    function resetGame() {
        let deck = [];
        const suits = ['♠', '♥', '♦', '♣'];
        for(let suit of suits) {
            for(let key in cardMap) {
                deck.push({ suit: suit, name: cardMap[key].n, value: cardMap[key].v });
            }
        }
        deck.sort(() => Math.random() - 0.5);

        // 各プレイヤーに10枚ずつ配る
        const hand1 = deck.slice(0, 10).sort((a,b) => a.value - b.value);
        const hand2 = deck.slice(10, 20).sort((a,b) => a.value - b.value);

        myHand = hand1;
        isMyTurn = true;
        tableCard = null;
        tableCount = 0;
        consecutivePasses = 0;

        conn.send({ type: 'START', hand: hand2, yourTurn: false });
        updateUI();
    }

    // 画面描写の更新
    function updateUI() {
        const statusEl = document.getElementById('status');
        if (isMyTurn) {
            statusEl.innerText = "🌟 あなたのターンです";
            statusEl.style.color = "#ffeb3b";
        } else {
            statusEl.innerText = "相手のターンを待っています...";
